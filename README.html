let t=document.getElementById("t");
let scanner = null;
let mode = "";

function save(){

let r=t.rows[t.rows.length-1];

let a=r.cells[0].querySelector("input").value;
let c = r.cells[2].querySelector("input").value.trim();

let b = goods[c] || "";
r.cells[1].querySelector("input").value = b;

if(!b||!c){
alert("Штрихкод не найден или не заполнены поля");
return;
}

r.cells[0].textContent=a;
r.cells[1].textContent=b;
r.cells[2].textContent=c;

r.cells[3].innerHTML=
`<button onclick="edit(this)">Исправить</button>
<button onclick="del(this)">Удалить</button>`;

let nr=t.insertRow();

nr.innerHTML=`
<td><input></td>
<td><input></td>
<td><input></td>
<td></td>
`;

}

function edit(btn){

let r=btn.parentNode.parentNode;

r.cells[0].innerHTML=`<input value="${r.cells[0].textContent}">`;
r.cells[1].innerHTML=`<input value="${r.cells[1].textContent}">`;
r.cells[2].innerHTML=`<input value="${r.cells[2].textContent}">`;

r.cells[3].innerHTML=`<button onclick="saveEdit(this)">OK</button>`;

}

function saveEdit(btn){

let r=btn.parentNode.parentNode;

r.cells[0].textContent=r.cells[0].querySelector("input").value;
r.cells[1].textContent=r.cells[1].querySelector("input").value;
r.cells[2].textContent=r.cells[2].querySelector("input").value;

r.cells[3].innerHTML=
`<button onclick="edit(this)">Исправить</button>
<button onclick="del(this)">Удалить</button>`;

}

function del(btn){
btn.parentNode.parentNode.remove();
}

function search(){

let f=document.getElementById("search").value.toLowerCase();

for(let i=1;i<t.rows.length;i++){

let r=t.rows[i];

let a=r.cells[1].textContent.toLowerCase();
let b=r.cells[2].textContent.toLowerCase();

r.style.display=
(a.includes(f)||b.includes(f))?"":"none";

}

}

function startLookup(){
    mode = "lookup";
    startCamera();
}

function startInventory(){
    mode = "inventory";
    startCamera();
}

function startCamera(){

    if(scanner){
        return;
    }

    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },

        {
            fps:10,
            qrbox: { width: 250, height: 260 }
        },

        onScan
        function(error) {
        }
        }
    );

}

function onScan(decodedText, decodedResult){

    console.log(decodedText);

}
